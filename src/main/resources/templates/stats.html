<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>掛號統計 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        nav { background: #0F2443; padding: 12px; border-radius: 8px; margin-bottom: 24px; }
        nav a { color: white; margin-right: 20px; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #5EEAD4; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: 20px 0; }
        .card { background: #F8FAFC; border-left: 5px solid #14B8A6; padding: 16px; border-radius: 8px; }
        .card .label { color: #475569; font-size: 14px; }
        .card .value { color: #0F2443; font-size: 30px; font-weight: bold; margin-top: 6px; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #0F2443; color: white; }
    </style>
</head>
<body>
    <nav>
        <a th:href="@{/}">首頁</a>
        <a th:href="@{/doctors}">醫師清單</a>
        <a th:href="@{/patients}">病歷資料</a>
        <a th:href="@{/appointment/new}">線上掛號</a>
        <a th:href="@{/appointments}">掛號記錄</a>
        <a th:href="@{/login}">醫師登入</a>
    </nav>

    <h1>掛號統計</h1>

    <div class="cards">
        <div class="card">
            <div class="label">醫師總數</div>
            <div class="value" th:text="${doctorCount}">0</div>
        </div>
        <div class="card">
            <div class="label">病患總數</div>
            <div class="value" th:text="${patientCount}">0</div>
        </div>
        <div class="card">
            <div class="label">掛號總數</div>
            <div class="value" th:text="${appointmentCount}">0</div>
        </div>
    </div>

    <h2>依科別分組掛號數</h2>

    <table>
        <thead>
            <tr>
                <th>科別</th>
                <th>掛號數</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${departmentCounts.isEmpty()}">
                <td colspan="2">目前沒有掛號資料</td>
            </tr>
            <tr th:each="entry : ${departmentCounts.entrySet()}">
                <td th:text="${entry.key}">家醫科</td>
                <td th:text="${entry.value}">0</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
