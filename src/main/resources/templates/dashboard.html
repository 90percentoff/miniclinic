<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #14B8A6; padding-bottom: 12px; gap: 24px; }
        h1 { color: #0F2443; margin: 0; }
        .doctor-meta { color: #475569; margin: 8px 0 0; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .header-actions a { color: #0F2443; text-decoration: none; font-weight: bold; }
        .header-actions a:hover { color: #0D9488; }
        .logout-form { margin: 0; }
        .logout-form button { background: #94A3B8; color: white; padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; }
        .logout-form button:hover { background: #64748B; }
        table { width: 100%; border-collapse: collapse; margin-top: 24px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; vertical-align: middle; }
        th { background: #0F2443; color: white; }
        .status-BOOKED { color: #F59E0B; font-weight: bold; }
        .status-COMPLETED { color: #10B981; font-weight: bold; }
        .status-CANCELLED { color: #94A3B8; }
        .cancel-btn { background: #DC2626; color: white; border: none; border-radius: 4px; padding: 6px 10px; cursor: pointer; }
        .cancel-btn:hover { background: #B91C1C; }
        .empty { color: #64748B; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Dashboard</h1>
            <p class="doctor-meta">
                歡迎，<span th:text="${doctor.name}"></span>（<span th:text="${doctor.department}"></span>）
            </p>
        </div>
        <div class="header-actions">
            <a th:href="@{/password}">修改密碼</a>
            <form class="logout-form" th:action="@{/logout}" method="post">
                <button type="submit">登出</button>
            </form>
        </div>
    </header>

    <h2 th:text="|今日掛號：${today}|"></h2>

    <p class="empty" th:if="${appointments.isEmpty()}">今日沒有掛號。</p>

    <table th:unless="${appointments.isEmpty()}">
        <thead>
            <tr>
                <th>時段</th>
                <th>病患</th>
                <th>病歷號</th>
                <th>狀態</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="appt : ${appointments}">
                <td th:text="${appt.timeSlot}">AM</td>
                <td th:text="${appt.patient.name}">測試病患甲</td>
                <td th:text="${appt.patient.chartNo}">TEST00001</td>
                <td>
                    <span th:text="${appt.status}" th:class="${'status-' + appt.status}">BOOKED</span>
                </td>
                <td>
                        <button class="cancel-btn"
                            th:if="${appt.status == 'BOOKED'}"
                            th:data-id="${appt.apptId}"
                            onclick="cancelAppointment(this)">取消</button>

                        <button class="complete-btn"
                            th:if="${appt.status == 'BOOKED'}"
                            th:data-id="${appt.apptId}"
                            onclick="completeAppointment(this)">完成</button>
                </td>
            </tr>
        </tbody>
    </table>

    <p style="text-align: center; margin-top: 20px;">
        <a th:href="@{/}">← 回首頁</a>
    </p>

    <script>
        async function cancelAppointment(button) {
            const apptId = button.dataset.id;
            const response = await fetch(`/api/appointments/${apptId}/status`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'same-origin',
                body: JSON.stringify({ status: 'CANCELLED' })
            });

            if (response.ok) {
                location.reload();
                return;
            }

            if (response.status === 401) {
                location.href = '/login';
                return;
            }

            alert('取消失敗');
        }

        async function completeAppointment(button) {
            const apptId = button.dataset.id;
            const response = await fetch(`/api/appointments/${apptId}/status`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'same-origin',
                body: JSON.stringify({ status: 'COMPLETED' })
            });

            if (response.ok) {
                location.reload();
                return;
            }

            if (response.status === 401) {
                location.href = '/login';
                return;
            }

            alert('標記完成失敗');
        }
    </script>
</body>
</html>
